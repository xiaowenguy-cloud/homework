<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>四年级暑假每日待办表</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=ZCOOL+KuaiLe&display=swap');

:root {
  --bg-page: #F7F3EE;
  --bg-card: #FFFFFF;
  --bg-card-alt: #FFF8F0;
  --text-primary: #2D1B0E;
  --text-secondary: #6B5744;
  --text-muted: #A08B78;
  --accent-orange: #FF8C42;
  --accent-green: #4CAF50;
  --accent-blue: #42A5F5;
  --accent-pink: #E91E63;
  --accent-purple: #9C27B0;
  --accent-teal: #009688;
  --accent-yellow: #FFC107;
  --accent-red: #FF5722;
  --border-light: #E8DDD0;
  --border-medium: #D4C4B0;
  --shadow-sm: 0 2px 8px rgba(45,27,14,0.06);
  --shadow-md: 0 4px 16px rgba(45,27,14,0.1);
  --radius-sm: 10px;
  --radius-md: 14px;
  --radius-lg: 18px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg-page);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

.app-layout {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ===== LEFT: Sidebar / Calendar ===== */
.sidebar {
  width: 440px;
  min-width: 360px;
  background: linear-gradient(180deg, #FFF9F2 0%, #FFF3E8 100%);
  border-right: 1px solid var(--border-light);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  padding: 20px 16px 20px 20px;
}

.sidebar::-webkit-scrollbar { width: 6px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }

.header {
  text-align: center;
  padding: 8px 0 14px;
  flex-shrink: 0;
}
.header h1 {
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 1.6rem;
  background: linear-gradient(135deg, var(--accent-orange), var(--accent-pink));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 2px;
}
.header .subtitle {
  color: var(--text-muted);
  font-size: 0.75rem;
  font-weight: 300;
}

/* Mini stats in sidebar */
.sidebar-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 14px;
}
.sb-stat {
  background: var(--bg-card);
  border-radius: var(--radius-sm);
  padding: 10px 8px;
  text-align: center;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border-light);
}
.sb-stat .num {
  font-size: 1.3rem;
  font-weight: 900;
  line-height: 1;
}
.sb-stat .num.green { color: var(--accent-green); }
.sb-stat .num.orange { color: var(--accent-orange); }
.sb-stat .lbl {
  font-size: 0.68rem;
  color: var(--text-muted);
  margin-top: 3px;
}

/* Calendar */
.month-section {
  margin-bottom: 14px;
}
.month-title {
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 1.05rem;
  color: var(--text-primary);
  margin-bottom: 8px;
  padding-left: 4px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.month-title .month-badge {
  width: 26px;
  height: 26px;
  border-radius: 8px;
  background: var(--accent-orange);
  color: white;
  font-size: 0.7rem;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-family: 'Noto Sans SC', sans-serif;
  font-weight: 700;
}

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}
.cal-header {
  text-align: center;
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--text-muted);
  padding: 4px 0;
  text-transform: uppercase;
}

.cal-day {
  aspect-ratio: 1;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  position: relative;
  transition: all 0.2s;
  background: var(--bg-card);
  border: 1.5px solid transparent;
  box-shadow: var(--shadow-sm);
  user-select: none;
}
.cal-day:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
  border-color: var(--border-medium);
}
.cal-day .day-num {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1;
}
.cal-day .day-status {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  margin-top: 4px;
}
.cal-day .day-count {
  font-size: 0.55rem;
  color: var(--text-muted);
  margin-top: 1px;
}

.cal-day.empty {
  background: transparent;
  box-shadow: none;
  cursor: default;
  border: none;
}
.cal-day.empty:hover {
  transform: none;
}

/* Status colors */
.cal-day.status-done {
  background: linear-gradient(135deg, #E8F5E9, #C8E6C9);
  border-color: rgba(76,175,80,0.3);
}
.cal-day.status-done .day-num { color: #2E7D32; }
.cal-day.status-done .day-status { background: var(--accent-green); width: 6px; height: 6px; }

.cal-day.status-partial {
  background: linear-gradient(135deg, #FFF3E0, #FFE0B2);
  border-color: rgba(255,140,66,0.3);
}
.cal-day.status-partial .day-num { color: #E65100; }
.cal-day.status-partial .day-status { background: var(--accent-orange); }

.cal-day.status-none {
  background: var(--bg-card);
  border-color: var(--border-light);
}
.cal-day.status-none .day-status { background: var(--border-light); }

.cal-day.status-today {
  box-shadow: 0 0 0 2px var(--accent-orange);
}
.cal-day.status-today .day-num {
  background: var(--accent-orange);
  color: white;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.72rem;
}

.cal-day.selected {
  box-shadow: 0 0 0 2.5px var(--accent-purple);
}

/* ===== RIGHT: Task Panel ===== */
.main {
  flex: 1;
  overflow-y: auto;
  padding: 20px 28px 40px;
  position: relative;
}
.main::-webkit-scrollbar { width: 8px; }
.main::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 4px; }

.date-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
  padding-bottom: 14px;
  border-bottom: 2px solid var(--border-light);
}
.date-header .dh-left {
  display: flex;
  align-items: baseline;
  gap: 10px;
}
.date-header .dh-date {
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 1.45rem;
  color: var(--text-primary);
}
.date-header .dh-weekday {
  font-size: 0.88rem;
  color: var(--text-secondary);
  font-weight: 500;
}
.date-header .dh-progress {
  font-size: 0.82rem;
  font-weight: 700;
  padding: 6px 14px;
  border-radius: 20px;
  background: var(--bg-card-alt);
  color: var(--text-secondary);
}
.date-header .dh-progress.done {
  background: #E8F5E9;
  color: #2E7D32;
}

/* Task list in main */
.task-panel {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  padding: 20px 24px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border-light);
}

.task-list { list-style: none; }
.task-item {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 12px 10px;
  border-radius: var(--radius-sm);
  transition: background 0.2s;
  cursor: pointer;
}
.task-item:hover { background: var(--bg-card-alt); }
.task-item + .task-item {
  border-top: 1px solid var(--border-light);
  padding-top: 14px;
  margin-top: 2px;
}

/* Custom checkbox */
.task-check {
  position: relative;
  width: 24px;
  height: 24px;
  flex-shrink: 0;
  margin-top: 1px;
}
.task-check input {
  opacity: 0; position: absolute;
  width: 100%; height: 100%;
  cursor: pointer; z-index: 2;
}
.task-check .checkmark {
  position: absolute;
  top: 0; left: 0;
  width: 24px; height: 24px;
  border: 2.5px solid var(--border-medium);
  border-radius: 8px;
  background: white;
  transition: all 0.25s;
}
.task-check input:checked + .checkmark {
  background: var(--accent-green);
  border-color: var(--accent-green);
}
.task-check input:checked + .checkmark::after {
  content: '';
  position: absolute;
  left: 7px; top: 2px;
  width: 7px; height: 12px;
  border: solid white;
  border-width: 0 2.5px 2.5px 0;
  transform: rotate(45deg);
}
.task-check input:hover + .checkmark {
  border-color: var(--accent-green);
  box-shadow: 0 0 0 3px rgba(76,175,80,0.15);
}

.task-content { flex: 1; }
.task-subject-tag {
  display: inline-block;
  font-size: 0.65rem;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 4px;
  margin-bottom: 3px;
  letter-spacing: 0.5px;
}
.tag-yuwen { background: #FFF3E0; color: #E65100; }
.tag-shuxue { background: #E3F2FD; color: #1565C0; }
.tag-yingyu { background: #F3E5F5; color: #7B1FA2; }
.tag-tiyu { background: #E8F5E9; color: #2E7D32; }
.tag-laodong { background: #FFF8E1; color: #F57F17; }
.tag-yuedu { background: #FCE4EC; color: #C62828; }

.task-title {
  font-size: 0.93rem;
  color: var(--text-primary);
  line-height: 1.5;
  transition: all 0.25s;
}
.task-item.completed .task-title {
  text-decoration: line-through;
  color: var(--text-muted);
}
.task-detail {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-top: 3px;
  line-height: 1.5;
}
.task-item.completed .task-detail {
  text-decoration: line-through;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}
.empty-state .icon {
  font-size: 3rem;
  margin-bottom: 12px;
  opacity: 0.5;
}
.empty-state p {
  font-size: 1rem;
}

/* Celebration banner */
.celebration {
  display: none;
  text-align: center;
  padding: 18px;
  background: linear-gradient(135deg, #E8F5E9, #C8E6C9);
  border-radius: var(--radius-md);
  margin-bottom: 16px;
  animation: fadeSlideIn 0.4s ease;
}
.celebration.show { display: block; }
.celebration h3 {
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 1.15rem;
  color: #2E7D32;
}

/* Overview at bottom of sidebar */
.sidebar-overview {
  margin-top: auto;
  padding-top: 12px;
  border-top: 1px dashed var(--border-medium);
}
.sidebar-overview h4 {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-bottom: 8px;
  font-weight: 500;
}
.overview-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.overview-tag {
  font-size: 0.68rem;
  padding: 3px 8px;
  border-radius: 6px;
  font-weight: 500;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #323232;
  color: white;
  padding: 12px 24px;
  border-radius: 10px;
  font-size: 0.9rem;
  z-index: 999;
  opacity: 0;
  transition: all 0.35s ease;
  box-shadow: var(--shadow-lg);
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Global progress bar in main */
.global-progress {
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.global-progress .gp-track {
  flex: 1;
  height: 10px;
  background: var(--border-light);
  border-radius: 5px;
  overflow: hidden;
}
.global-progress .gp-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent-orange), var(--accent-green));
  border-radius: 5px;
  transition: width 0.5s ease;
  width: 0%;
}
.global-progress .gp-text {
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--text-secondary);
  white-space: nowrap;
  min-width: 50px;
  text-align: right;
}

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Responsive */
@media (max-width: 900px) {
  .app-layout { flex-direction: column; height: auto; overflow: visible; }
  .sidebar {
    width: 100%;
    min-width: auto;
    max-height: 55vh;
    border-right: none;
    border-bottom: 1px solid var(--border-light);
    padding: 16px;
  }
  .main { padding: 16px; }
  .sidebar-overview { display: none; }
}

@media print {
  .sidebar { width: 100%; border: none; }
  .app-layout { flex-direction: column; height: auto; overflow: visible; }
}
</style>
</head>

  </main>
</div>

<div class="toast" id="toast"></div>

/* ===== STATE ===== */
let selectedDate = getTodayDateKey();
let checkedState = loadState();

function weekday_names_en(idx) {
  const names = ['mon','tue','wed','thu','fri','sat','sun'];
  return names[idx] || 'mon';
}

function getTodayDateKey() {
  const today = new Date();
  const m = today.getMonth() + 1;
  const d = today.getDate();
  const key = m + "-" + d;
  if (DAILY_TASKS[key]) return key;
  return "7-1";
}

function loadState() {
  try {
    const saved = localStorage.getItem('summer_todo_v3');
    return saved ? JSON.parse(saved) : {};
  } catch(e) { return {}; }
}
function saveState() {
  localStorage.setItem('summer_todo_v3', JSON.stringify(checkedState));
}

function getStatus(dateKey) {
  const dayData = DAILY_TASKS[dateKey];
  if (!dayData || !dayData.tasks.length) return { total: 0, done: 0 };
  let done = 0;
  dayData.tasks.forEach((_, i) => {
    if (checkedState[dateKey + "_" + i]) done++;
  });
  return { total: dayData.tasks.length, done };
}

function getStatusClass(dateKey) {
  const s = getStatus(dateKey);
  if (s.total === 0) return "status-none";
  if (s.done === s.total) return "status-done";
  if (s.done > 0) return "status-partial";
  return "status-none";
}

/* ===== RENDER CALENDAR ===== */
function renderCalendar() {
  renderMonthCalendar(7, "calJuly", "七月");
  renderMonthCalendar(8, "calAugust", "八月");
}

function renderMonthCalendar(month, containerId, label) {
  const container = document.getElementById(containerId);
  const firstDay = new Date(2026, month - 1, 1).getDay();
  const daysInMonth = new Date(2026, month, 0).getDate();
  const weekDays = ["日", "一", "二", "三", "四", "五", "六"];

  let html = '<div class="month-title"><span class="month-badge">' + month + '</span>' + label + '</div>';
  html += '<div class="cal-grid">';
  weekDays.forEach(wd => {
    html += '<div class="cal-header">' + wd + '</div>';
  });

  for (let i = 0; i < firstDay; i++) {
    html += '<div class="cal-day empty"></div>';
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const key = month + "-" + d;
    const dayData = DAILY_TASKS[key];
    const hasTasks = dayData && dayData.tasks.length > 0;
    const status = getStatusClass(key);
    const s = getStatus(key);
    const isToday = key === getTodayDateKey();
    const isSelected = key === selectedDate;
    const cls = "cal-day " + status + (isToday ? " status-today" : "") + (isSelected ? " selected" : "") + (hasTasks ? "" : " status-none");

    html += '<div class="' + cls + '" onclick="selectDate(\'' + key + '\')">';
    html += '<div class="day-num">' + d + '</div>';
    if (hasTasks) {
      html += '<div class="day-status"></div>';
      html += '<div class="day-count">' + s.done + '/' + s.total + '</div>';
    }
    html += '</div>';
  }

  html += '</div>';
  container.innerHTML = html;
}

/* ===== RENDER TASKS ===== */
function renderTasks() {
  const dhDate = document.getElementById("dhDate");
  const dhWeekday = document.getElementById("dhWeekday");
  const dhProgress = document.getElementById("dhProgress");
  const panel = document.getElementById("taskPanel");
  const celebration = document.getElementById("celebration");

  const dayData = DAILY_TASKS[selectedDate];
  if (!dayData) {
    dhDate.textContent = selectedDate;
    dhWeekday.textContent = "";
    dhProgress.textContent = "";
    panel.innerHTML = '<div class="empty-state"><div class="icon">&#128197;</div><p>该日暂无作业安排</p></div>';
    return;
  }

  const parts = selectedDate.split("-");
  dhDate.textContent = parts[0] + "月" + parts[1] + "日";
  dhWeekday.textContent = dayData.weekday;

  const s = getStatus(selectedDate);
  dhProgress.textContent = s.done + "/" + s.total;
  dhProgress.className = "dh-progress" + (s.done === s.total && s.total > 0 ? " done" : "");

  if (s.done === s.total && s.total > 0) {
    celebration.className = "celebration show";
  } else {
    celebration.className = "celebration";
  }

  let html = '<ul class="task-list">';
  dayData.tasks.forEach((task, i) => {
    const key = selectedDate + "_" + i;
    const checked = checkedState[key] || false;
    html += '<li class="task-item ' + (checked ? "completed" : "") + '">';
    html += '<label class="task-check">';
    html += '<input type="checkbox" ' + (checked ? "checked" : "") + ' onchange="toggleTask(\'' + key + '\', this)">';
    html += '<span class="checkmark"></span>';
    html += '</label>';
    html += '<div class="task-content">';
    html += '<span class="task-subject-tag tag-' + task.tagClass + '">' + task.tag + '</span>';
    html += '<div class="task-title">' + task.title + '</div>';
    if (task.detail) html += '<div class="task-detail">' + task.detail + '</div>';
    html += '</div>';
    html += '</li>';
  });
  html += '</ul>';
  panel.innerHTML = html;
}

/* ===== UPDATE STATS ===== */
function updateStats() {
  let total = 0, done = 0, streak = 0, maxStreak = 0;
  Object.keys(DAILY_TASKS).sort().forEach(key => {
    const s = getStatus(key);
    total += s.total;
    done += s.done;
    if (s.total > 0 && s.done === s.total) {
      streak++;
      maxStreak = Math.max(maxStreak, streak);
    } else {
      streak = 0;
    }
  });

  document.getElementById("sbTotalTasks").textContent = total;
  document.getElementById("sbDoneTasks").textContent = done;
  document.getElementById("sbDays").textContent = "62";
  document.getElementById("sbStreak").textContent = maxStreak;

  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById("globalFill").style.width = pct + "%";
  document.getElementById("globalText").textContent = pct + "%";
}

/* ===== ACTIONS ===== */
function selectDate(dateKey) {
  selectedDate = dateKey;
  localStorage.setItem('summer_todo_selected_v3', selectedDate);
  renderCalendar();
  renderTasks();
}

function toggleTask(key, checkbox) {
  checkedState[key] = checkbox.checked;
  saveState();
  renderCalendar();
  renderTasks();
  updateStats();
  if (checkbox.checked) {
    showToast("完成一项任务，继续加油！");
  }
}

function showToast(msg) {
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.className = "toast show";
  setTimeout(() => { toast.className = "toast"; }, 2000);
}

/* ===== INIT ===== */
(function init() {
  const saved = localStorage.getItem('summer_todo_selected_v3');
  if (saved && DAILY_TASKS[saved]) selectedDate = saved;
  renderCalendar();
  renderTasks();
  updateStats();
})();
</script>
